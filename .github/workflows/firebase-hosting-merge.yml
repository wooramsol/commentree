# Deploy to Firebase Hosting when changes land on main.
# Setup: https://firebase.google.com/docs/hosting/github-integration
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Firebase CLI uses FIREBASE_SERVICE_ACCOUNT_<PROJECT_ID> (hyphens → underscores, uppercase).
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMMENTREE_87C10 || secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: commentree-87c10
