<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>commentree</title>
    
    <link rel="preconnect" href="https://d3js.org">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <script src="https://d3js.org/d3.v7.min.js" defer></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f9f9f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        header { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: flex-start; max-width: 96%; }
        
        .nav-box { background: rgba(255, 255, 255, 0.9); padding: 10px 14px; border-radius: 12px; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 8px; width: 380px; max-width: 100%; box-sizing: border-box; pointer-events: auto; }
        
        .input-wrapper { display: flex; align-items: center; width: 100%; justify-content: space-between; position: relative; }
        .domain-text { font-weight: 800; color: #000; font-size: 1.05rem; letter-spacing: -0.5px; white-space: nowrap; }
        
        #navInput { border: none; border-bottom: 2px solid #ddd; background: transparent; font-size: 1.05rem; font-weight: bold; font-family: 'Helvetica Neue', Arial, sans-serif; color: #000; width: 100%; padding: 0 4px; margin: 0 6px 0 2px; outline: none; transition: border-color 0.3s; flex-grow: 1; }
        #navInput::placeholder { color: #999; font-weight: 500; }
        #navInput:focus { border-bottom: 2px solid #0095f6; }
        
        #goBtn { 
            display: none; 
            background: #0095f6; 
            border: none; 
            font-size: 0.85rem; 
            font-weight: bold; 
            color: #fff; 
            padding: 6px 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s; 
            flex-shrink: 0; 
        }
        #goBtn:hover { background: #0077c5; transform: scale(1.05); }
        #goBtn:active { transform: scale(0.95); }

        .instruction-text { font-size: 0.85rem; color: #666; margin: 0; padding-left: 2px; }
        
        .autocomplete-container {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            max-height: 180px;
            overflow-y: auto;
            z-index: 20;
            display: none;
            flex-direction: column;
            margin-top: 8px;
            padding: 4px;
            box-sizing: border-box;
        }
        .autocomplete-container::-webkit-scrollbar { width: 4px; }
        .autocomplete-container::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }
        .autocomplete-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #333;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            word-break: break-all;
        }
        .autocomplete-item:hover { background: #0095f6; color: white; }

        .dropdown-btn { background: #f0f0f0; border: none; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; font-weight: bold; color: #444; cursor: pointer; text-align: left; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-btn:hover { background: #e4e4e4; }
        
        .dropdown-arrow { display: inline-block; transition: transform 0.3s ease; }
        .dropdown-btn.open .dropdown-arrow { transform: rotate(180deg); }
        
        .handles-list-container { display: flex; flex-direction: column; gap: 4px; max-height: 150px; overflow-y: auto; padding-right: 4px; margin-top: 2px; }
        .hidden { display: none !important; }
        .handles-list-container::-webkit-scrollbar { width: 4px; }
        .handles-list-container::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }
        .handles-list-container a { background: rgba(0, 149, 246, 0.05); color: #333; text-decoration: none; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; transition: background 0.2s, color 0.2s; display: block; word-break: break-all; }
        .handles-list-container a:hover { background: #0095f6; color: white; }
        
        .match-highlight { color: #0095f6; font-weight: 900; }
        .autocomplete-item:hover .match-highlight { color: white; }
        
        .active-item {
            background-color: #e6f3ff !important;
            color: #0095f6 !important;
            border-left: 4px solid #0095f6 !important;
            font-weight: 800 !important;
        }
        .active-item:hover {
            background-color: #0095f6 !important;
            color: white !important;
        }
        .active-item .match-highlight { color: #0077c5; }
        .active-item:hover .match-highlight { color: white; }

        @media (max-width: 600px) {
            header { left: 50%; transform: translateX(-50%); top: 15px; width: 96%; align-items: center; }
            .nav-box { width: 100%; min-width: auto; }
        }
        
        #inputModal, #deleteModal, #deleteTreeModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 85%; max-width: 320px; }
        input[type="text"].modal-input, input[type="password"].modal-input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box;} 
        button.modal-btn { padding: 10px 25px; background: #000; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 1rem;}
        button.modal-btn:hover { background: #333; }
        .delete-btn { background: #d9534f !important; } 
        .delete-btn:hover { background: #c9302c !important; }
        .bubble-text { display: flex; justify-content: center; align-items: center; text-align: center; width: 100%; height: 100%; white-space: normal; word-wrap: break-word; word-break: break-word; line-height: 1.2; overflow: hidden; padding: 2px; box-sizing: border-box; }

        .zoom-controls { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .zoom-controls button { width: 44px; height: 44px; background: rgba(255, 255, 255, 0.9); border: 1px solid #ddd; border-radius: 10px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1.5rem; font-weight: bold; color: #555; cursor: pointer; outline: none; transition: background 0.2s, color 0.2s, border-color 0.2s; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; }
        .zoom-controls button:hover { background: #ffffff; color: #0095f6; border-color: #0095f6; }
        @media (max-width: 600px) { .zoom-controls { bottom: 15px; right: 15px; } .zoom-controls button { width: 38px; height: 38px; font-size: 1.3rem; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-box">
            <div class="input-wrapper">
                <span class="domain-text">commentree.net/</span>
                <input type="text" id="navInput" autocomplete="off">
                <button id="goBtn" onclick="navigateToHandle()">Create</button>
                <div id="autocompleteList" class="autocomplete-container"></div>
            </div>
            <p class="instruction-text">Click any nodes to add comments.</p>
            <button id="dropdownToggle" class="dropdown-btn" onclick="toggleDropdown()">
                <span>Visit other commentrees <span id="treeCountDisplay"></span></span>
                <span class="dropdown-arrow">▾</span>
            </button>
            <div id="allHandlesList" class="handles-list-container hidden">Loading...</div>
        </div>
    </header>

    <div id="chart"></div>

    <div class="zoom-controls">
        <button id="zoomInBtn" title="Zoom In">+</button>
        <button id="zoomOutBtn" title="Zoom Out">−</button>
    </div>

    <div id="inputModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 5px;">Leave a comment</h3>
            <p style="font-size: 0.85rem; color: #d9534f; margin-top: 0; font-weight: 500;">Once posted, it cannot be deleted.</p>
            <input type="text" id="commentInput" class="modal-input" placeholder="Enter your comment" maxlength="50">
            <br>
            <button class="modal-btn" onclick="closeModal()" style="background:#999; margin-right: 5px;">Cancel</button>
            <button class="modal-btn" onclick="submitComment()">Post</button>
        </div>
    </div>

    <div id="deleteModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 5px;">Delete Node?</h3>
            <p style="font-size: 0.85rem; color: #777; margin-top: 0;">Child nodes will also be deleted.</p>
            <input type="password" id="deletePasswordInput" class="modal-input" placeholder="Enter password">
            <br>
            <button class="modal-btn" onclick="closeDeleteModal()" style="background:#999; margin-right: 5px;">Cancel</button>
            <button class="modal-btn delete-btn" onclick="submitDelete()">Delete</button>
        </div>
    </div>

    <div id="deleteTreeModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 5px;">Delete Entire Tree?</h3>
            <p style="font-size: 0.85rem; color: #777; margin-top: 0;">This will permanently remove <strong id="treeToDeleteName"></strong>.</p>
            <input type="password" id="deleteTreePasswordInput" class="modal-input" placeholder="Enter password">
            <br>
            <button class="modal-btn" onclick="closeDeleteTreeModal()" style="background:#999; margin-right: 5px;">Cancel</button>
            <button class="modal-btn delete-btn" onclick="submitDeleteTree()">Delete</button>
        </div>
    </div>

    <script type="module">
        // 💡 1. 비용 절감을 위해 getDoc, arrayUnion, arrayRemove 모듈 추가
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, getDocs, deleteDoc, getCountFromServer, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD03P2MQJUUwTpkc2B6EGTrttPtb0JKbxU",
            authDomain: "commentree-87c10.firebaseapp.com",
            projectId: "commentree-87c10",
            storageBucket: "commentree-87c10.firebasestorage.app",
            messagingSenderId: "174582656984",
            appId: "1:174582656984:web:e877e8161686731c878cad",
            measurementId: "G-9F4JTS1DV0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const igRegex = /^(?!.*\.\.)(?!^\.)(?!.*\.$)[a-zA-Z0-9._]{1,30}$/;

        let handle = window.location.pathname.replace(/\//g, "").toLowerCase().trim(); 
        if (!handle) {
            handle = "@wooramsol"; 
            window.history.replaceState(null, "", "/" + handle);
        }
        handle = decodeURIComponent(handle);

        let cleanHandleForCheck = handle.replace('@', '');
        if (cleanHandleForCheck && !igRegex.test(cleanHandleForCheck)) {
            alert("Invalid handle. Instagram handles can only contain letters, numbers, periods, and underscores (Max 30 chars).");
            handle = "@wooramsol";
            window.history.replaceState(null, "", "/" + handle);
        }
        if (!handle.startsWith("@")) handle = "@" + handle;

        const navInput = document.getElementById("navInput");
        navInput.placeholder = handle; 
        
        window.navigateToHandle = function() {
            let val = navInput.value.trim();
            if(!val) return; 
            
            let cleanVal = val.replace('@', '');
            if (!igRegex.test(cleanVal)) {
                alert("Invalid handle. Instagram handles can only contain letters, numbers, periods, and underscores (Max 30 chars).");
                return;
            }

            if(!val.startsWith('@')) val = '@' + val;
            window.location.href = "/" + val.toLowerCase();
        }
        
        navInput.addEventListener("keyup", e => { if (e.key === "Enter") window.navigateToHandle(); });

        let isTreesLoaded = false;
        let isTreesLoading = false;
        let cachedHandles = [];
        let treeToDelete = null; 

        // 💡 요금 폭탄 방지: 가벼운 메타데이터 문서만 읽어옴 (자동 마이그레이션 적용)
        async function loadTreesData() {
            if (isTreesLoaded || isTreesLoading) return;
            isTreesLoading = true;
            try {
                const metaRef = doc(db, "metadata", "handles");
                const metaSnap = await getDoc(metaRef);
                let tempHandles = [];
                
                if (metaSnap.exists() && metaSnap.data().list) {
                    // 새 방식: 인덱스만 읽기 (Read 1회)
                    tempHandles = metaSnap.data().list;
                } else {
                    // 호환성: 처음일 경우 전체 문서 읽어와서 저장해주기
                    const querySnapshot = await getDocs(collection(db, "trees"));
                    querySnapshot.forEach(d => tempHandles.push(d.id));
                    await setDoc(metaRef, { list: tempHandles }, { merge: true });
                }
                
                tempHandles.sort((a, b) => a.replace('@', '').toLowerCase().localeCompare(b.replace('@', '').toLowerCase()));
                cachedHandles = tempHandles;
                isTreesLoaded = true;
                
                document.getElementById("treeCountDisplay").innerText = `(${cachedHandles.length})`;
            } catch (e) {
                console.error("Error fetching handles:", e);
            } finally {
                isTreesLoading = false;
            }
        }

        async function updateTreeCount() {
            try {
                const snapshot = await getCountFromServer(collection(db, "trees"));
                document.getElementById("treeCountDisplay").innerText = `(${snapshot.data().count})`;
            } catch (e) {
                console.error("Error getting tree count:", e);
            }
        }

        window.toggleDropdown = async function() {
            const list = document.getElementById("allHandlesList");
            const btn = document.getElementById("dropdownToggle");
            const isHidden = list.classList.toggle("hidden");
            btn.classList.toggle("open", !isHidden);

            if (!isHidden) {
                if (!isTreesLoaded) {
                    list.innerHTML = "<span style='font-size: 0.8rem; color:#999; padding: 4px;'>Loading trees...</span>";
                    await loadTreesData();
                }
                renderDropdownList();
            }
        }

        function renderDropdownList() {
            const listEl = document.getElementById("allHandlesList");
            listEl.innerHTML = "";
            if (cachedHandles.length === 0) {
                listEl.innerHTML = "<span style='font-size: 0.8rem; color:#999; padding: 4px;'>No other trees yet.</span>";
                return;
            }
            cachedHandles.forEach(h => {
                let displayHandle = h.startsWith('@') ? h : '@' + h;
                if (displayHandle.toLowerCase() === '@wooramsol') displayHandle += ' 🧑🏻‍💻';

                const aTag = document.createElement('a');
                aTag.href = "/" + h;
                aTag.innerText = displayHandle;
                
                if (h.toLowerCase().trim() === handle.toLowerCase().trim()) {
                    aTag.classList.add('active-item');
                    aTag.title = "Current Tree";
                }
                listEl.appendChild(aTag);
            });
        }

        const autocompleteList = document.getElementById('autocompleteList');

        navInput.addEventListener('click', () => {
            if (isTreesLoaded && navInput.value.trim()) showAutocomplete();
        });

        navInput.addEventListener('focus', async () => {
            if (!isTreesLoaded) await loadTreesData();
            if (navInput.value.trim()) showAutocomplete();
        });

        // 💡 타이핑 디바운싱: 타자를 다 치고 0.25초 뒤에만 연산 실행
        let debounceTimer;
        navInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                if (!isTreesLoaded) await loadTreesData();
                showAutocomplete();
            }, 250);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-wrapper')) {
                autocompleteList.style.display = 'none';
            }
        });

        function showAutocomplete() {
            if (!isTreesLoaded) return;
            
            let val = navInput.value.trim().replace('@', '').toLowerCase();
            const goBtn = document.getElementById('goBtn');
            
            const exactMatch = cachedHandles.some(h => h.replace('@', '').toLowerCase() === val);
            const isValid = igRegex.test(val);

            if (val && !exactMatch && isValid) {
                goBtn.style.display = 'block';
            } else {
                goBtn.style.display = 'none';
            }

            if (!val) {
                autocompleteList.style.display = 'none';
                return;
            }

            const filtered = cachedHandles.filter(h => h.replace('@', '').toLowerCase().includes(val));

            if (filtered.length === 0) {
                autocompleteList.innerHTML = "<div style='padding: 8px 12px; font-size: 0.85rem; color:#999;'>No matches found</div>";
                autocompleteList.style.display = 'flex';
                return;
            }

            autocompleteList.innerHTML = '';
            filtered.slice(0, 10).forEach(h => {
                let displayHandle = h.startsWith('@') ? h : '@' + h;
                if (displayHandle.toLowerCase() === '@wooramsol') displayHandle += ' 🧑🏻‍💻';

                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                
                if (h.toLowerCase().trim() === handle.toLowerCase().trim()) {
                    div.classList.add('active-item');
                }
                
                const regex = new RegExp(`(${val})`, 'gi');
                div.innerHTML = displayHandle.replace(regex, `<span class="match-highlight">$1</span>`);
                
                div.onmousedown = (e) => {
                    if (e.button === 2) return; 
                    e.preventDefault(); 
                    navInput.value = h.replace('@', '');
                    autocompleteList.style.display = 'none';
                    window.navigateToHandle();
                };

                autocompleteList.appendChild(div);
            });
            autocompleteList.style.display = 'flex';
        }

        window.openDeleteTreeModal = function(targetHandle) {
            treeToDelete = targetHandle;
            document.getElementById("treeToDeleteName").innerText = targetHandle;
            document.getElementById("deleteTreeModal").style.display = "flex";
            document.getElementById("deleteTreePasswordInput").focus();
        }

        window.closeDeleteTreeModal = function() {
            document.getElementById("deleteTreeModal").style.display = "none";
            document.getElementById("deleteTreePasswordInput").value = "";
            treeToDelete = null;
        }

        window.submitDeleteTree = async function() {
            const pw = document.getElementById("deleteTreePasswordInput").value;
            if (pw !== "921102") {
                alert("Incorrect password.");
                return;
            }

            if (!treeToDelete) return;
            const target = treeToDelete;

            try {
                if (target.toLowerCase() === handle.toLowerCase()) {
                    if (typeof window.unsubTree === 'function') window.unsubTree();
                }

                await deleteDoc(doc(db, "trees", target));
                
                // 💡 인덱스 문서에서도 삭제된 핸들 지우기
                await updateDoc(doc(db, "metadata", "handles"), { list: arrayRemove(target) }).catch(e => console.log(e));
                
                cachedHandles = cachedHandles.filter(h => h !== target);
                
                window.closeDeleteTreeModal();
                document.getElementById("treeCountDisplay").innerText = `(${cachedHandles.length})`;
                
                if (target.toLowerCase() === handle.toLowerCase()) {
                    alert("This tree has been deleted.");
                    window.location.href = "/@wooramsol";
                } else {
                    renderDropdownList();
                    showAutocomplete();
                }
            } catch (e) {
                console.error("Error deleting tree:", e);
                alert("Failed to delete tree. Error: " + e.message);
            }
        }

        document.getElementById("deleteTreePasswordInput").addEventListener("keyup", e => { if (e.key === "Enter") window.submitDeleteTree(); });

        window.dataset = { nodes: [], links: [] };
        let selectedNode = null;
        let nodeToDelete = null; 
        let width = window.innerWidth;
        let height = window.innerHeight;

        const docRef = doc(db, "trees", handle); 

        window.unsubTree = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const nodes = data.nodes.map((d, index) => {
                    let node = {...d};
                    if (node.id === "root") {
                        node.color = "#ffffff"; 
                        node.label = `What do you think of ${handle}?`;
                    }
                    return node;
                });
                window.dataset = { nodes, links: data.links.map(d => ({...d})) };
            } else {
                const initialData = {
                    nodes: [{ id: "root", label: `What do you think of ${handle}?`, color: "#ffffff", radius: 80, x: width / 2, y: height / 2, phase: Math.random() * Math.PI * 2 }],
                    links: []
                };
                
                setDoc(docRef, initialData).then(async () => {
                    // 💡 인덱스 문서에 새 핸들 추가
                    await setDoc(doc(db, "metadata", "handles"), { list: arrayUnion(handle) }, { merge: true });
                    updateTreeCount();
                    isTreesLoaded = false; 
                });
                window.dataset = initialData;
            }
            restartSimulation(); 
        });

        let svg, g, linkLayer, nodeLayer, simulation, zoom;
        
        updateTreeCount();

        svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);
        zoom = d3.zoom().on("zoom", event => g.attr("transform", event.transform));
        svg.call(zoom).on("dblclick.zoom", null); 

        g = svg.append("g");
        linkLayer = g.append("g").attr("class", "links");
        nodeLayer = g.append("g").attr("class", "nodes");

        simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id)) 
            .force("charge", d3.forceManyBody()) 
            .force("collide", d3.forceCollide().radius(d => d.radius + 10).iterations(3));
            
        const zoomInBtn = d3.select("#zoomInBtn");
        const zoomOutBtn = d3.select("#zoomOutBtn");
        const zoomFactor = 1.3;

        function manualZoom(factor) {
            if(!svg || !zoom) return;
            svg.transition()
                .duration(300) 
                .call(zoom.scaleBy, factor); 
        }

        zoomInBtn.on("click", () => manualZoom(zoomFactor));
        zoomOutBtn.on("click", () => manualZoom(1 / zoomFactor));

        if(window.dataset.nodes.length > 0) restartSimulation();

        function restartSimulation() {
            if(!simulation) return; 
            width = window.innerWidth;
            height = window.innerHeight;
            const isMobile = width < 600;

            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.force("link").distance(isMobile ? 55 : 110);
            simulation.force("charge").strength(isMobile ? -250 : -450);

            simulation.nodes(window.dataset.nodes);
            simulation.force("link").links(window.dataset.links);
            update();
            
            // 💡 배터리 최적화: alphaTarget(0.05) -> (0) 으로 변경해 불필요한 물리연산 정지
            simulation.alpha(1).alphaTarget(0).restart();
            setTimeout(zoomToFit, 300);
        }

        function zoomToFit() {
            const nodes = window.dataset.nodes;
            if (!nodes || nodes.length === 0 || !svg) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            nodes.forEach(d => {
                if (d.x === undefined || d.y === undefined) return;
                minX = Math.min(minX, d.x - d.radius); maxX = Math.max(maxX, d.x + d.radius);
                minY = Math.min(minY, d.y - d.radius); maxY = Math.max(maxY, d.y + d.radius);
            });
            if (minX === Infinity) return; 

            const contentW = maxX - minX;
            const contentH = maxY - minY;
            if (contentW === 0 || contentH === 0) return;

            let scale = 0.85 / Math.max(contentW / width, contentH / height);
            if (scale > 1) scale = 1; 

            svg.transition().duration(1200).call(
                zoom.transform, 
                d3.zoomIdentity
                    .translate(width / 2 * (1 - scale), height / 2 * (1 - scale))
                    .scale(scale)
            );
        }

        window.addEventListener('resize', () => {
            if(!svg) return;
            width = window.innerWidth;
            height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        let isTimerRunning = false;

        function update() {
            const link = linkLayer.selectAll(".link")
                .data(window.dataset.links, d => (d.source.id || d.source) + "-" + (d.target.id || d.target))
                .join("line")
                .attr("class", "link")
                .attr("stroke", "#000000") 
                .attr("stroke-width", 2);

            const node = nodeLayer.selectAll(".node")
                .data(window.dataset.nodes, d => d.id)
                .join(
                    enter => {
                        const nodeG = enter.append("g").attr("class", "node").call(drag(simulation));
                        nodeG.append("circle")
                            .attr("stroke", "#000")
                            .attr("stroke-width", 2) 
                            .style("cursor", "pointer")
                            .style("filter", "drop-shadow(0px 3px 3px rgba(0,0,0,0.1))")
                            .on("click", (event, d) => { 
                                event.stopPropagation(); 
                                openModal(d); 
                            })
                            .on("contextmenu", (event, d) => {
                                if (event.pointerType === "touch" || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                                    return; 
                                }
                                event.preventDefault(); 
                                event.stopPropagation();
                                
                                if (d.id === "root") {
                                    openDeleteTreeModal(handle);
                                    return;
                                }
                                openDeleteModal(d);
                            });
                            
                        nodeG.append("foreignObject")
                            .style("pointer-events", "none") 
                            .append("xhtml:div")
                            .attr("class", "bubble-text");
                        return nodeG;
                    }
                );

            node.select("circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.id === "root" ? "#ffffff" : d.color);

            node.select("foreignObject")
                .attr("width", d => d.id === "root" ? d.radius * 3.5 : d.radius * 1.45) 
                .attr("height", d => d.id === "root" ? d.radius * 3.5 : d.radius * 1.45)
                .attr("x", d => d.id === "root" ? -d.radius * 1.75 : -d.radius * 0.725)
                .attr("y", d => d.id === "root" ? -d.radius * 1.75 : -d.radius * 0.725);

            node.select(".bubble-text")
                .style("color", "#000")
                .style("font-weight", "bold")
                .style("font-size", d => {
                    const len = d.label.length;
                    let divider = len < 8 ? 2.5 : len < 15 ? 3.2 : len < 25 ? 4.0 : 5.0;               
                    return Math.max(10, d.radius / divider) + "px";
                })
                .html(d => {
                    if (d.id === "root") {
                        const cleanH = handle.replace("@", "");
                        const scalingFactor = handle.length > 15 ? 15 / handle.length : 1;
                        const dynamicFontSize = (0.95 * scalingFactor) + "em";

                        return `
                            <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; padding: 0 10px; box-sizing: border-box;">
                                <span style="font-size: 0.85em; margin-bottom: 2px;">What do you think of</span>
                                <a href="https://www.instagram.com/${cleanH}/" target="_blank" 
                                   style="color: #0000EE; text-decoration: underline; pointer-events: auto; word-break: break-all; font-size: ${dynamicFontSize}; line-height: 1.15; max-width: 95%;"
                                   onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()">
                                    ${handle}
                                </a>
                                <span style="font-size: 0.85em; margin-top: 2px;">?</span>
                            </div>
                        `;
                    }
                    return d.label;
                });

            simulation.on("tick", () => {});

            if (!isTimerRunning) {
                isTimerRunning = true;
                d3.timer(() => {
                    const time = Date.now() / 1000;
                    
                    nodeLayer.selectAll(".node").attr("transform", d => {
                        if(!d.x) d.x = width/2; if(!d.y) d.y = height/2;
                        d.displayX = d.x + (Math.cos(time * 2.5 + (d.phase||0)) * 5);
                        d.displayY = d.y + (Math.sin(time * 3.0 + (d.phase||0)) * 8); 
                        return `translate(${d.displayX}, ${d.displayY})`;
                    });
                    
                    linkLayer.selectAll(".link")
                        .attr("x1", d => d.source.displayX || d.source.x)
                        .attr("y1", d => d.source.displayY || d.source.y) 
                        .attr("x2", d => d.target.displayX || d.target.x)
                        .attr("y2", d => d.target.displayY || d.target.y);
                });
            }
        }

        window.openModal = function(node) {
            selectedNode = node;
            document.getElementById("inputModal").style.display = "flex";
            document.getElementById("commentInput").focus();
        }

        window.closeModal = function() {
            document.getElementById("inputModal").style.display = "none";
            document.getElementById("commentInput").value = "";
            selectedNode = null;
        }

        window.submitComment = async function() {
            const text = document.getElementById("commentInput").value;
            if (!text) return alert("Please enter a comment.");

            const newId = "node-" + Date.now();
            const newNode = { id: newId, label: text, color: "#ffffff", radius: 50, x: selectedNode.x + (Math.random() - 0.5) * 50, y: selectedNode.y + (Math.random() - 0.5) * 50, phase: Math.random() * Math.PI * 2 };
            const newLink = { source: selectedNode.id, target: newId };

            window.dataset.nodes.push(newNode);
            window.dataset.links.push(newLink);
            
            const parentNode = window.dataset.nodes.find(n => n.id === selectedNode.id);
            if (parentNode && parentNode.radius < 200) parentNode.radius += 8;

            window.closeModal();

            const saveNodes = window.dataset.nodes.map(n => ({ id: n.id, label: n.label, color: n.color, radius: n.radius, x: n.x, y: n.y, phase: n.phase }));
            const saveLinks = window.dataset.links.map(l => ({ source: l.source.id || l.source, target: l.target.id || l.target }));

            await updateDoc(docRef, { nodes: saveNodes, links: saveLinks });
        }

        window.openDeleteModal = function(node) {
            nodeToDelete = node;
            document.getElementById("deleteModal").style.display = "flex";
            document.getElementById("deletePasswordInput").focus();
        }

        window.closeDeleteModal = function() {
            document.getElementById("deleteModal").style.display = "none";
            document.getElementById("deletePasswordInput").value = "";
            nodeToDelete = null;
        }

        window.submitDelete = async function() {
            const pw = document.getElementById("deletePasswordInput").value;
            if (pw !== "921102") {
                alert("Incorrect password.");
                return;
            }

            if (!nodeToDelete) return;

            const nodesToRemove = new Set([nodeToDelete.id]);
            let added;
            do {
                added = false;
                window.dataset.links.forEach(l => {
                    const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
                    const targetId = typeof l.target === 'object' ? l.target.id : l.target;
                    
                    if (nodesToRemove.has(sourceId) && !nodesToRemove.has(targetId)) {
                        nodesToRemove.add(targetId);
                        added = true;
                    }
                });
            } while(added);

            window.dataset.nodes = window.dataset.nodes.filter(n => !nodesToRemove.has(n.id));
            window.dataset.links = window.dataset.links.filter(l => {
                const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
                const targetId = typeof l.target === 'object' ? l.target.id : l.target;
                return !nodesToRemove.has(sourceId) && !nodesToRemove.has(targetId);
            });

            window.closeDeleteModal();

            const saveNodes = window.dataset.nodes.map(n => ({ id: n.id, label: n.label, color: n.color, radius: n.radius, x: n.x, y: n.y, phase: n.phase }));
            const saveLinks = window.dataset.links.map(l => ({ source: l.source.id || l.source, target: l.target.id || l.target }));

            await updateDoc(docRef, { nodes: saveNodes, links: saveLinks });
        }

        function drag(simulation) {
            function dragstarted(event, d) { 
                if (!event.active) simulation.alphaTarget(0.3).restart(); 
                d.fx = d.x; d.fy = d.y; 
            }
            function dragged(event, d) { 
                d.fx = event.x; d.fy = event.y; 
            }
            function dragended(event, d) { 
                // 💡 배터리 최적화: 드래그가 끝나면 다시 0으로 돌려 물리연산 멈춤
                if (!event.active) simulation.alphaTarget(0); 
                d.fx = null; d.fy = null; 
            }
            return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
        }

        document.getElementById("commentInput").addEventListener("keyup", e => { if (e.key === "Enter") window.submitComment(); });
        document.getElementById("deletePasswordInput").addEventListener("keyup", e => { if (e.key === "Enter") window.submitDelete(); });
    </script>
</body>
</html>
