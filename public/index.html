<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>commentree</title>
    <script src="https://d3js.org/d3.v7.min.js?v=20260430" defer></script>
    <style>
        :root {
            --accent: #16a34a;
            --accent-hover: #15803d;
            --accent-soft: rgba(22, 163, 74, 0.1);
            --accent-tint: #ecfdf5;
            --link-on-light: #166534;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f9f9f9; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-user-select: none; user-select: none; touch-action: none; overscroll-behavior: none; }
        header { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: flex-start; max-width: 96%; }
        .nav-box { position: relative; z-index: 2; background: rgba(255, 255, 255, 0.9); padding: 10px 14px; border-radius: 12px; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 8px; width: 380px; max-width: 100%; box-sizing: border-box; pointer-events: auto; }
        .input-wrapper { display: flex; align-items: center; width: 100%; justify-content: space-between; position: relative; }
        .domain-text { font-weight: 800; color: #000; font-size: 1.05rem; letter-spacing: -0.5px; white-space: nowrap; }
        #navInput { border: none; border-bottom: 2px solid #ddd; background: transparent; font-size: 1.05rem; font-weight: bold; color: #000; width: 100%; padding: 0 4px; margin: 0 6px 0 2px; outline: none; transition: border-color 0.3s; flex-grow: 1; -webkit-user-select: text; user-select: text; }
        #navInput:focus { border-bottom: 2px solid var(--accent); }
        #goBtn { display: none; background: var(--accent); border: none; font-size: 0.85rem; font-weight: bold; color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
        #goBtn:hover { background: var(--accent-hover); }
        .autocomplete-container { position: absolute; top: 100%; left: 0; width: 100%; background: white; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); max-height: 180px; overflow-y: auto; z-index: 20; display: none; flex-direction: column; margin-top: 8px; padding: 4px; box-sizing: border-box; }
        .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 0.95rem; font-weight: 500; color: #333; border-radius: 6px; transition: background 0.2s; word-break: break-all; }
        .autocomplete-item:hover { background: var(--accent); color: white; }
        .match-highlight { color: var(--accent); font-weight: 900; }
        .dropdown-btn { background: #f0f0f0; border: none; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; font-weight: bold; color: #444; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-btn:hover { background: #e8e8e8; }
        #dropdownArrow { transition: transform 0.2s; display: inline-block; font-size: 0.7rem; }
        .dropdown-btn.open #dropdownArrow { transform: rotate(180deg); }
        .handles-list-container { display: flex; flex-direction: column; gap: 4px; max-height: 150px; overflow-y: auto; padding-right: 4px; margin-top: 2px; }
        .hidden { display: none !important; }
        .handles-list-container a { background: var(--accent-soft); color: #333; text-decoration: none; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; display: block; word-break: break-all; transition: background 0.2s; position: relative; }
        .handles-list-container a:hover { background: var(--accent); color: white; }
        .delete-tree-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #ff4444; color: white; border: none; border-radius: 4px; padding: 2px 6px; font-size: 0.7rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .handles-list-container a:hover .delete-tree-btn { opacity: 1; }
        .active-item { background-color: var(--accent-tint) !important; color: var(--accent) !important; border-left: 4px solid var(--accent) !important; font-weight: 800 !important; }
        .dragging, .dragging * { cursor: grabbing !important; }
        .node { cursor: cell; pointer-events: all; }
        #tooltip { position: absolute; display: none; background: rgba(0,0,0,0.8); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; pointer-events: none; z-index: 1000; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #inputModal, #deleteModal, #deleteTreeModal, #adminModal, #logoutModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); width: 92%; max-width: 400px; text-align: left; }
        .reply-context { font-size: 0.8rem; color: #777; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .reply-target { color: var(--accent); font-weight: 800; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .modal-input { width: 100%; border: none; background: #f5f5f5; border-radius: 12px; font-size: 16px; padding: 15px; margin-bottom: 15px; outline: none; box-sizing: border-box; -webkit-user-select: text; user-select: text; font-family: inherit;}
        #commentInput.modal-input-comment {
            min-height: 52px;
            max-height: min(40vh, 220px);
            resize: none;
            overflow-y: auto;
            line-height: 1.45;
            word-break: break-word;
            overflow-wrap: anywhere;
            vertical-align: top;
        }
        .modal-disclaimer { font-size: 0.75rem; color: #888; margin: 0 0 10px 0; line-height: 1.4; }
        .modal-footer { display: flex; justify-content: space-between; align-items: center; }
        .modal-btn { padding: 12px 28px; background: #000; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 800; font-size: 1rem; transition: transform 0.1s; }
        .bubble-text { display: flex; justify-content: center; align-items: center; text-align: center; width: 100%; height: 100%; overflow: visible; box-sizing: border-box; pointer-events: none; }
        .insta-link { color: var(--link-on-light); text-decoration: underline; }
        .insta-link:hover { color: var(--accent-hover); }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .pulse-node circle { animation: heartbeat 1.5s ease-in-out infinite; }
        .zoom-controls { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: auto; }
        .zoom-controls button { width: 50px; height: 50px; background: white; border: 1px solid #ddd; border-radius: 15px; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .chart-hint {
            position: relative;
            z-index: 0;
            width: 380px;
            max-width: 100%;
            margin: 10px 0 0 0;
            padding: 0 6px;
            box-sizing: border-box;
            text-align: center;
            font-size: clamp(0.62rem, 2.6vw, 0.9rem);
            font-weight: 700;
            color: var(--accent);
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            animation: chartHintPulse 2.5s ease-in-out infinite;
            text-shadow: 0 0 10px #f9f9f9, 0 1px 2px rgba(0,0,0,0.08);
        }
        @keyframes chartHintPulse {
            0%, 100% { opacity: 0.28; }
            50% { opacity: 1; }
        }
        @media (max-width: 600px) {
            header { left: 50%; transform: translateX(-50%); top: 15px; width: 96%; align-items: center; }
            .nav-box { width: 100%; }
            .chart-hint { width: 100%; padding: 0 2px; font-size: clamp(0.58rem, 3.4vw, 0.82rem); }
        }
    </style>
</head>
<body>
    <div id="tooltip">instagram 바로가기</div>
    <header>
        <div class="nav-box">
            <div class="input-wrapper">
                <span class="domain-text">commentree.net/</span>
                <input type="text" id="navInput" autocomplete="off" spellcheck="false">
                <button id="goBtn" onclick="navigateToHandle()">Create</button>
                <div id="autocompleteList" class="autocomplete-container"></div>
            </div>
            <button id="dropdownToggle" class="dropdown-btn" onclick="toggleDropdown()">
                <span>Visit other commentrees <span id="treeCountDisplay"></span></span>
                <span id="dropdownArrow">▼</span>
            </button>
            <div id="allHandlesList" class="handles-list-container hidden"></div>
        </div>
        <p class="chart-hint" aria-live="polite">Click any node to add a comment.</p>
    </header>
    <div id="chart"></div>
    <div class="zoom-controls"><button id="zoomInBtn">+</button><button id="zoomOutBtn">−</button></div>

    <div id="inputModal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <div class="reply-context"><span>Replying to</span><span id="replyTargetLabel" class="reply-target"></span></div>
            <p class="modal-disclaimer">Once posted, comments cannot be deleted.</p>
            <textarea id="commentInput" class="modal-input modal-input-comment" maxlength="50" rows="1" placeholder="Write a comment..." enterkeyhint="send" spellcheck="true"></textarea>
            <div class="modal-footer"><span id="charCount" style="color:#999; font-size:0.8rem">0/50</span><button class="modal-btn" onclick="submitComment()">Post</button></div>
        </div>
    </div>

    <div id="deleteModal" onclick="if(event.target===this) closeDeleteModal()"><div class="modal-content" style="text-align:center"><h3>Delete Node?</h3><button class="modal-btn" style="background:#d9534f" onclick="submitDelete()">Delete</button></div></div>
    <div id="deleteTreeModal" onclick="if(event.target===this) closeDeleteTreeModal()"><div class="modal-content" style="text-align:center"><h3>Delete Entire Tree?</h3><p id="treeToDeleteName" style="font-weight:bold"></p><button class="modal-btn" style="background:#d9534f" onclick="submitDeleteTree()">Delete</button></div></div>
    <div id="adminModal" onclick="if(event.target===this) closeAdminModal()"><div class="modal-content" style="text-align:center"><h3>Admin Login</h3><input type="email" id="adminEmail" class="modal-input" placeholder="Email"><input type="password" id="adminPassword" class="modal-input" placeholder="Password"><button class="modal-btn" onclick="submitAdminLogin()">Login</button></div></div>
    <div id="logoutModal" onclick="if(event.target===this) closeLogoutModal()"><div class="modal-content" style="text-align:center"><h3>Logout?</h3><button class="modal-btn" onclick="submitLogout()">Logout</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, getDocs, deleteDoc, getDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyD03P2MQJUUwTpkc2B6EGTrttPtb0JKbxU", authDomain: "commentree-87c10.firebaseapp.com", projectId: "commentree-87c10", storageBucket: "commentree-87c10.firebasestorage.app", messagingSenderId: "174582656984", appId: "1:174582656984:web:e877e8161686731c878cad", measurementId: "G-9F4JTS1DV0" };
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        function escapeRegExp(s) {
            return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let isAdmin = false;
        onAuthStateChanged(auth, (user) => { isAdmin = !!user; });

        window.submitAdminLogin = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPassword').value); alert("Admin ON"); closeAdminModal(); } catch(err) { alert("Fail"); } };
        window.submitLogout = async () => { try { await signOut(auth); alert("Logged Out"); closeLogoutModal(); } catch(err) { alert("Fail"); } };
        window.closeAdminModal = () => document.getElementById('adminModal').style.display='none';
        window.closeLogoutModal = () => document.getElementById('logoutModal').style.display='none';
        window.resizeCommentInput = () => {
            const el = document.getElementById('commentInput');
            if (!el) return;
            el.style.height = 'auto';
            const minH = 52, cap = Math.min(window.innerHeight * 0.38, 220);
            el.style.height = Math.min(Math.max(el.scrollHeight, minH), cap) + 'px';
        };
        window.closeModal = () => {
            const el = document.getElementById('commentInput');
            document.getElementById('inputModal').style.display = 'none';
            el.value = '';
            el.style.height = '';
            document.getElementById('charCount').innerText = '0/50';
        };

        const igRegex = /^(?!.*\.\.)(?!^\.)(?!.*\.$)[a-zA-Z0-9._]{1,30}$/;
        let handle = window.location.pathname.replace(/\//g, "").toLowerCase().trim() || "@wooramsol";
        if (!handle.startsWith("@")) handle = "@" + handle;
        const navInput = document.getElementById("navInput");
        navInput.placeholder = handle;

        window.navigateToHandle = async function() {
            let val = navInput.value.trim().toLowerCase();
            if(!val) return;
            if(val === 'admin') { if (isAdmin) document.getElementById('logoutModal').style.display='flex'; else document.getElementById('adminModal').style.display='flex'; return; }
            let clean = val.replace('@', '');
            if(!igRegex.test(clean)) return alert("Invalid Handle");
            val = '@' + clean;
            const checkRef = doc(db, "trees", val);
            const snap = await getDoc(checkRef);
            if(!snap.exists()) {
                // 💡 루트 노드 반지름 65로 설정 (일반 노드 55보다 조금 큰 사이즈)
                await setDoc(checkRef, { nodes: [{ id: "root", label: val, color: "#ffffff", radius: 65, x: window.innerWidth/2, y: window.innerHeight/2, phase: Math.random()*Math.PI*2 }], links: [] });
                await setDoc(doc(db, "metadata", "handles"), { list: arrayUnion(val) }, { merge: true });
            }
            window.location.href = "/" + val;
        };

        let cachedHandles = [];
        async function loadTreesData() {
            const metaSnap = await getDoc(doc(db, "metadata", "handles"));
            if (metaSnap.exists()) {
                cachedHandles = [...new Set(metaSnap.data().list || [])].sort();
                document.getElementById("treeCountDisplay").innerText = `(${cachedHandles.length})`;
            }
        }
        loadTreesData();

        window.toggleDropdown = async function() {
            const list = document.getElementById("allHandlesList");
            const btn = document.getElementById("dropdownToggle");
            const isHidden = list.classList.toggle("hidden");
            btn.classList.toggle("open", !isHidden);
            if (!isHidden) {
                list.innerHTML = cachedHandles.map(h => {
                    const labelRaw = h.toLowerCase() === '@wooramsol' ? h + '👨‍💻' : h;
                    const label = escapeHtml(labelRaw);
                    const delBtn = isAdmin ? `<button type="button" class="delete-tree-btn" onclick="event.preventDefault(); event.stopPropagation(); openDeleteTreeModal(${JSON.stringify(h)})">DEL</button>` : '';
                    return `<a href="/${h}" class="${h.toLowerCase() === handle.toLowerCase() ? 'active-item' : ''}">${label}${delBtn}</a>`;
                }).join('');
            }
        };

        navInput.addEventListener('input', () => {
            let v = navInput.value.trim().toLowerCase();
            if(!v || v==='admin') { document.getElementById('autocompleteList').style.display='none'; return; }
            const cleanV = v.replace('@', '');
            const filtered = cachedHandles.filter(h => h.toLowerCase().includes(cleanV));
            const list = document.getElementById('autocompleteList');
            list.innerHTML = filtered.slice(0, 8).map(h => {
                const labelRaw = h.toLowerCase() === '@wooramsol' ? h + '👨‍💻' : h;
                const safe = escapeHtml(labelRaw);
                const hl = cleanV ? safe.replace(new RegExp(`(${escapeRegExp(cleanV)})`, 'gi'), '<span class="match-highlight">$1</span>') : safe;
                return `<div class="autocomplete-item" onmousedown="window.location.href=${JSON.stringify('/' + h)}">${hl}</div>`;
            }).join('');
            list.style.display = filtered.length ? 'flex' : 'none';
            document.getElementById('goBtn').style.display = (!cachedHandles.some(h=>h.toLowerCase()==='@'+cleanV) && igRegex.test(cleanV)) ? 'block' : 'none';
        });

        let dataset = { nodes: [], links: [] };
        const docRef = doc(db, "trees", handle);
        onSnapshot(docRef, snap => {
            if(snap.exists()) {
                const d = snap.data();
                // 💡 루트 노드 로드 시 강제로 반지름 65로 보정 (일관성 유지)
                dataset.nodes = d.nodes.map(n => ({...n, label: n.id==='root'?handle:n.label, radius: n.id==='root'?65:n.radius}));
                dataset.links = d.links;
            } else {
                dataset = { nodes: [{ id: "root", label: handle, color: "#ffffff", radius: 65, x: window.innerWidth/2, y: window.innerHeight/2 }], links: [] };
            }
            restartSimulation(dataset.nodes.length);
        });

        const svg = d3.select("#chart").append("svg").attr("width", window.innerWidth).attr("height", window.innerHeight);
        const g = svg.append("g");
        const zoom = d3.zoom().on("zoom", e => g.attr("transform", e.transform));
        svg.call(zoom).on("dblclick.zoom", null);
        const linkLayer = g.append("g"), nodeLayer = g.append("g");
        const tooltip = d3.select("#tooltip");

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id))
            .force("charge", d3.forceManyBody().strength(-450))
            .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2))
            .force("collide", d3.forceCollide().radius(d => d.radius + 15));

        let prevNodeCount = 0;
        function restartSimulation(newCount) {
            simulation.nodes(dataset.nodes);
            simulation.force("link").links(dataset.links);
            const alphaVal = newCount > prevNodeCount ? 0.2 : 0;
            prevNodeCount = newCount;
            simulation.alpha(alphaVal).alphaTarget(0).restart();
            update();
        }

        function handleHover(elem, d, isOver) {
            const group = d3.select(elem);
            group.select("circle").transition().duration(200).attr("r", isOver ? d.radius * 1.15 : d.radius);
            const textElem = group.select(".bubble-text > div").transition().duration(200);
            if (d.id === 'root') {
                const baseFS = (d.radius * 2) / (handle.length * 0.75);
                textElem.style("font-size", isOver ? `${Math.min(baseFS, d.radius * 0.7) * 1.15}px` : `${Math.min(baseFS, d.radius * 0.7)}px`);
            } else {
                textElem.style("font-size", isOver ? `${Math.max(13, d.radius/3.6)}px` : `${Math.max(11, d.radius/4.2)}px`);
            }
        }

        let isTimerRunning = false; 

        function update() {
            linkLayer.selectAll("line").data(dataset.links, d => (d.source.id || d.source) + "-" + (d.target.id || d.target)).join("line").attr("stroke", "#000").attr("stroke-width", 2);
            const node = nodeLayer.selectAll(".node").data(dataset.nodes, d => d.id).join(enter => {
                const nodeG = enter.append("g").attr("class", "node")
                    .on("mouseover", function(event, d) { handleHover(this, d, true); })
                    .on("mouseout", function(event, d) { handleHover(this, d, false); })
                    .on("click", (event, d) => { if (event.defaultPrevented) return; event.stopPropagation(); openModal(d); })
                    .on("contextmenu", (event, d) => { event.preventDefault(); if (!isAdmin) return; if (d.id === "root") { openDeleteTreeModal(handle); return; } openDeleteModal(d); })
                    .call(d3.drag().on("start", function(e, d) { if (!e.active) simulation.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; d3.select(this).classed("dragging", true); tooltip.style("display", "none"); }).on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; }).on("end", function(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; d3.select(this).classed("dragging", false); }));
                nodeG.append("circle").attr("stroke", "#000").attr("stroke-width", 2);
                nodeG.append("foreignObject").append("xhtml:div").attr("class", "bubble-text");
                return nodeG;
            });
            node.select("circle").attr("r", d => d.radius).attr("fill", d => d.color);
            node.select("foreignObject").attr("width", d => d.radius * 2.2).attr("height", d => d.radius * 2.2).attr("x", d => -d.radius * 1.1).attr("y", d => -d.radius * 1.1).style("pointer-events", d => d.id === 'root' ? "auto" : "none");
            node.select(".bubble-text").html(d => {
                if (d.id === "root") {
                    const cleanH = handle.replace("@", "");
                    const igPath = encodeURIComponent(cleanH);
                    const fs = (d.radius * 2) / (handle.length * 0.75);
                    const igUrl = `https://www.instagram.com/${igPath}/`;
                    return `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; pointer-events:none; font-weight:900; font-size:${Math.min(fs, d.radius * 0.75)}px; transition: font-size 0.2s;"><a href="${igUrl}" target="_blank" rel="noopener noreferrer" class="insta-link" style="pointer-events:auto; white-space:nowrap; padding: 10px;" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" ontouchend="event.stopPropagation()" onclick="event.stopPropagation()">${escapeHtml(handle)}</a></div>`;
                }
                return `<div style="padding:12%; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:${Math.max(11, d.radius/4.2)}px; pointer-events:none; transition: font-size 0.2s;">${escapeHtml(d.label)}</div>`;
            });
            
            if (window.matchMedia("(hover: hover)").matches) {
                nodeLayer.selectAll(".insta-link")
                    .on("mouseover", function(event) { tooltip.style("display", "block").style("left", (event.pageX + 15) + "px").style("top", (event.pageY + 15) + "px"); })
                    .on("mousemove", function(event) { tooltip.style("left", (event.pageX + 15) + "px").style("top", (event.pageY + 15) + "px"); })
                    .on("mouseout", function() { tooltip.style("display", "none"); });
            }

            if (!isTimerRunning) {
                isTimerRunning = true;
                d3.timer(() => { 
                    const t = Date.now() / 1000;
                    nodeLayer.selectAll(".node").attr("transform", d => { 
                        let tx = (d.fx !== null && d.fx !== undefined) ? d.fx : d.x; 
                        let ty = (d.fy !== null && d.fy !== undefined) ? d.fy : d.y; 
                        d.displayX = tx + (Math.cos(t * 2.5 + (d.phase||0)) * 5); 
                        d.displayY = ty + (Math.sin(t * 3.0 + (d.phase||0)) * 8); 
                        return `translate(${d.displayX}, ${d.displayY})`; 
                    }); 
                    linkLayer.selectAll("line").attr("x1", d => d.source.displayX || d.source.x).attr("y1", d => d.source.displayY || d.source.y).attr("x2", d => d.target.displayX || d.target.x).attr("y2", d => d.target.displayY || d.target.y); 
                });
            }
        }

        const commentInputEl = document.getElementById('commentInput');
        commentInputEl.addEventListener('input', () => {
            document.getElementById('charCount').innerText = commentInputEl.value.length + '/50';
            window.resizeCommentInput();
        });
        commentInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.submitComment(); }
            if (e.key === 'Escape') window.closeModal();
        });

        let selNode;
        window.openModal = (n) => {
            selNode = n;
            document.getElementById('replyTargetLabel').innerText = `"${n.label}"`;
            document.getElementById('inputModal').style.display = 'flex';
            commentInputEl.focus();
            requestAnimationFrame(() => { requestAnimationFrame(() => window.resizeCommentInput()); });
        };
        window.submitComment = async () => {
            const v = commentInputEl.value.replace(/\s+/g, ' ').trim();
            if (!v) return;
            const nid = "n-" + Date.now();
            const cleanNodes = dataset.nodes.map(n => ({ id: n.id, label: n.label, color: n.color, radius: n.radius, x: n.x, y: n.y, phase: n.phase || 0 }));
            const cleanLinks = dataset.links.map(l => ({ source: l.source.id || l.source, target: l.target.id || l.target }));
            // 💡 일반 노드 시작 사이즈 55 유지
            cleanNodes.push({ id: nid, label: v, color: "#fff", radius: 55, x: selNode.x, y: selNode.y, phase: Math.random()*Math.PI*2 });
            cleanLinks.push({ source: selNode.id, target: nid });
            const p = cleanNodes.find(n => n.id === selNode.id); if (p && p.radius < 250) p.radius += 10;
            closeModal(); await updateDoc(docRef, { nodes: cleanNodes, links: cleanLinks });
        };
        window.submitDelete = async function() { const toRemove = new Set([window.nodeToDel.id]); let added; do { added = false; dataset.links.forEach(l => { const src = l.source.id || l.source, tgt = l.target.id || l.target; if (toRemove.has(src) && !toRemove.has(tgt)) { toRemove.add(tgt); added = true; } }); } while(added); const nodes = dataset.nodes.filter(n => !toRemove.has(n.id)); const links = dataset.links.filter(l => !toRemove.has(l.source.id || l.source) && !toRemove.has(l.target.id || l.target)); await updateDoc(docRef, { nodes: nodes.map(n=>({id:n.id,label:n.label,color:n.color,radius:n.radius,x:n.x,y:n.y,phase:n.phase})), links: links.map(l=>({source:l.source.id||l.source, target:l.target.id||l.target})) }); closeDeleteModal(); };
        window.submitDeleteTree = async function() { await deleteDoc(doc(db, "trees", window.treeToDel)); await updateDoc(doc(db, "metadata", "handles"), { list: arrayRemove(window.treeToDel) }); window.location.href = "/@wooramsol"; };
        window.openDeleteModal = (n) => { window.nodeToDel = n; document.getElementById('deleteModal').style.display = 'flex'; };
        window.closeDeleteModal = () => document.getElementById('deleteModal').style.display='none';
        window.openDeleteTreeModal = (h) => { window.treeToDel = h; document.getElementById('treeToDeleteName').innerText = h; document.getElementById('deleteTreeModal').style.display = 'flex'; };
        window.closeDeleteTreeModal = () => document.getElementById('deleteTreeModal').style.display='none';
        d3.select("#zoomInBtn").on("click", () => svg.transition().duration(300).call(zoom.scaleBy, 1.4));
        d3.select("#zoomOutBtn").on("click", () => svg.transition().duration(300).call(zoom.scaleBy, 0.7));
        window.addEventListener('resize', () => { svg.attr("width", window.innerWidth).attr("height", window.innerHeight); simulation.force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2)).alpha(0.1).restart(); });
        navInput.addEventListener("keyup", e => { if (e.key === "Enter") window.navigateToHandle(); });
    </script>
</body>
</html>
