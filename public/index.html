<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>commentree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f9f9f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        header { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            z-index: 10; 
            pointer-events: none; 
            display: flex;
            flex-direction: column; 
            align-items: flex-start;
            max-width: 96%; 
        }

        .nav-box {
            background: rgba(255, 255, 255, 0.9); 
            padding: 10px 14px; 
            border-radius: 12px; 
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column; 
            gap: 8px;
            width: fit-content;
            min-width: 260px; 
            max-width: 100%; 
            box-sizing: border-box; 
            pointer-events: auto; 
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        .domain-text {
            font-weight: 800;
            color: #000;
            font-size: 1.15rem;
            letter-spacing: -0.5px;
            white-space: nowrap; 
        }

        #navInput {
            border: none;
            border-bottom: 2px solid #ddd; 
            background: transparent;
            font-size: 1.15rem;
            font-weight: bold;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #000; 
            width: 100%; 
            padding: 0 4px; 
            margin-left: 2px;
            outline: none;
            transition: border-color 0.3s;
            flex-grow: 1;
        }
        #navInput::placeholder { color: #999; font-weight: 500; }
        #navInput:focus { border-bottom: 2px solid #0095f6; }

        #goBtn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #0095f6;
            padding: 0 0 0 5px;
            transition: transform 0.2s;
            flex-shrink: 0; 
        }
        #goBtn:hover { transform: translateX(3px); }

        .instruction-text {
            font-size: 0.85rem;
            color: #666;
            margin: 0; 
            padding-left: 2px;
        }

        .dropdown-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dropdown-btn:hover { background: #e4e4e4; }

        .handles-list-container {
            display: flex;
            flex-direction: column; 
            gap: 4px;
            max-height: 150px; 
            overflow-y: auto;
            padding-right: 4px; 
            margin-top: 2px;
        }
        
        .hidden { display: none !important; }

        .handles-list-container::-webkit-scrollbar { width: 4px; }
        .handles-list-container::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }

        .handles-list-container a {
            background: rgba(0, 149, 246, 0.05);
            color: #333;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
            display: block; 
            word-break: break-all;
        }
        .handles-list-container a:hover { background: #0095f6; color: white; }

        @media (max-width: 600px) {
            header { left: 50%; transform: translateX(-50%); top: 15px; width: 96%; align-items: center; }
            .nav-box { width: 100%; min-width: auto; }
        }

        #inputModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 85%; max-width: 320px; }
        input[type="text"].modal-input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box;} 
        button.modal-btn { padding: 10px 25px; background: #000; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 1rem;}
        button.modal-btn:hover { background: #333; }

        .bubble-text {
            display: flex; justify-content: center; align-items: center; text-align: center;
            width: 100%; height: 100%; white-space: normal;
            word-wrap: break-word; word-break: break-word; line-height: 1.2; overflow: hidden; padding: 2px; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-box">
            <div class="input-wrapper">
                <span class="domain-text">commentree.net/</span>
                <input type="text" id="navInput" autocomplete="off">
                <button id="goBtn" onclick="navigateToHandle()">→</button>
            </div>
            <p class="instruction-text">Click a node to add a comment.</p>
            <button id="dropdownToggle" class="dropdown-btn" onclick="toggleDropdown()">
                Visit other commentrees <span>▾</span>
            </button>
            <div id="allHandlesList" class="handles-list-container hidden">Loading...</div>
        </div>
    </header>

    <div id="chart"></div>

    <div id="inputModal">
        <div class="modal-content">
            <h3>Leave a comment</h3>
            <input type="text" id="commentInput" class="modal-input" placeholder="Enter your comment" maxlength="50">
            <br>
            <button class="modal-btn" onclick="closeModal()" style="background:#999; margin-right: 5px;">Cancel</button>
            <button class="modal-btn" onclick="submitComment()">Post</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyD03P2MQJUUwTpkc2B6EGTrttPtb0JKbxU",
            authDomain: "commentree-87c10.firebaseapp.com",
            projectId: "commentree-87c10",
            storageBucket: "commentree-87c10.firebasestorage.app",
            messagingSenderId: "174582656984",
            appId: "1:174582656984:web:e877e8161686731c878cad",
            measurementId: "G-9F4JTS1DV0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL Parsing & Handle Setup
        let handle = window.location.pathname.replace("/", "").toLowerCase(); 
        if (!handle) {
            handle = "@wooramsol"; 
            window.history.replaceState(null, "", "/" + handle);
        }
        handle = decodeURIComponent(handle);
        if (!handle.startsWith("@")) handle = "@" + handle;

        const navInput = document.getElementById("navInput");
        navInput.placeholder = handle; 
        
        window.navigateToHandle = function() {
            let val = navInput.value.trim();
            if(!val) return; 
            if(!val.startsWith('@')) val = '@' + val;
            window.location.href = "/" + val.toLowerCase();
        }
        navInput.addEventListener("keyup", e => { if (e.key === "Enter") window.navigateToHandle(); });

        window.toggleDropdown = function() {
            const list = document.getElementById("allHandlesList");
            const btnSpan = document.querySelector("#dropdownToggle span");
            const isHidden = list.classList.toggle("hidden");
            btnSpan.innerText = isHidden ? "▾" : "▴";
        }

        // Fetch Trees List
        async function fetchAllHandles() {
            try {
                const querySnapshot = await getDocs(collection(db, "trees"));
                const listEl = document.getElementById("allHandlesList");
                listEl.innerHTML = "";
                
                let allHandles = [];
                querySnapshot.forEach(doc => {
                    if (doc.id !== handle) allHandles.push(doc.id);
                });

                if (allHandles.length === 0) {
                    listEl.innerHTML = "<span style='font-size: 0.8rem; color:#999; padding: 4px;'>No other trees yet.</span>";
                    return;
                }

                allHandles.sort((a, b) => {
                    const cleanA = a.replace('@', '').toLowerCase();
                    const cleanB = b.replace('@', '').toLowerCase();
                    return cleanA.localeCompare(cleanB);
                });

                allHandles.forEach(h => {
                    let displayHandle = h.startsWith('@') ? h : '@' + h;
                    const aTag = document.createElement('a');
                    aTag.href = "/" + h;
                    aTag.innerText = displayHandle;
                    listEl.appendChild(aTag);
                });
            } catch (e) {
                console.error("Error fetching handles:", e);
                document.getElementById("allHandlesList").innerHTML = "Failed to load trees.";
            }
        }
        fetchAllHandles();

        // Global state
        window.dataset = { nodes: [], links: [] };
        let selectedNode = null;
        let width = window.innerWidth;
        let height = window.innerHeight;

        const docRef = doc(db, "trees", handle); 

        // Snapshot Listener
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const nodes = data.nodes.map((d, index) => {
                    let node = {...d};
                    if (node.id === "root") {
                        node.color = "#ffffff"; 
                        node.label = `What do you think of ${handle}?`;
                    }
                    return node;
                });

                window.dataset = { nodes, links: data.links.map(d => ({...d})) };
            } else {
                const initialData = {
                    nodes: [{ id: "root", label: `What do you think of ${handle}?`, color: "#ffffff", radius: 70, x: width / 2, y: height / 2, phase: Math.random() * Math.PI * 2 }],
                    links: []
                };
                setDoc(docRef, initialData); 
                window.dataset = initialData;
            }
            restartSimulation(); 
        });

        // D3 Initialization
        const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);
        const zoom = d3.zoom().on("zoom", event => g.attr("transform", event.transform));
        svg.call(zoom).on("dblclick.zoom", null); 

        const g = svg.append("g");
        const linkLayer = g.append("g").attr("class", "links");
        const nodeLayer = g.append("g").attr("class", "nodes");

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id)) 
            .force("charge", d3.forceManyBody()) 
            .force("collide", d3.forceCollide().radius(d => d.radius + 10).iterations(3));

        function restartSimulation() {
            width = window.innerWidth;
            height = window.innerHeight;
            const isMobile = width < 600;

            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.force("link").distance(isMobile ? 55 : 110);
            simulation.force("charge").strength(isMobile ? -250 : -450);

            simulation.nodes(window.dataset.nodes);
            simulation.force("link").links(window.dataset.links);
            update();
            simulation.alpha(1).restart();
            setTimeout(zoomToFit, 300);
        }

        // 💡 줌 & 카메라 이동 버그 완벽 수정
        function zoomToFit() {
            const nodes = window.dataset.nodes;
            if (!nodes || nodes.length === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            nodes.forEach(d => {
                if (d.x === undefined || d.y === undefined) return;
                minX = Math.min(minX, d.x - d.radius); maxX = Math.max(maxX, d.x + d.radius);
                minY = Math.min(minY, d.y - d.radius); maxY = Math.max(maxY, d.y + d.radius);
            });
            if (minX === Infinity) return; 

            const contentW = maxX - minX;
            const contentH = maxY - minY;
            if (contentW === 0 || contentH === 0) return;

            // 너무 거대하게 확대되는 현상 방지 (최대 1배율까지만 확대)
            let scale = 0.85 / Math.max(contentW / width, contentH / height);
            if (scale > 1) scale = 1; 

            // forceCenter 때문에 노드들이 이미 화면 중앙으로 알아서 모이고 있으므로, 
            // 카메라도 노드들의 옛날 좌표(midX, midY)를 쫓아갈 필요 없이 화면 중앙을 기준으로 스케일만 맞춰주면 됩니다!
            svg.transition().duration(1200).call(
                zoom.transform, 
                d3.zoomIdentity
                    .translate(width / 2 * (1 - scale), height / 2 * (1 - scale))
                    .scale(scale)
            );
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            d3.select("svg").attr("width", width).attr("height", height);
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        });

        function update() {
            const link = linkLayer.selectAll(".link")
                .data(window.dataset.links, d => (d.source.id || d.source) + "-" + (d.target.id || d.target))
                .join("line")
                .attr("class", "link")
                .attr("stroke", "#000000") 
                .attr("stroke-width", 2);

            const node = nodeLayer.selectAll(".node")
                .data(window.dataset.nodes, d => d.id)
                .join(
                    enter => {
                        const g = enter.append("g").attr("class", "node").call(drag(simulation));
                        g.append("circle")
                            .attr("stroke", "#000")
                            .attr("stroke-width", 2) 
                            .style("cursor", "pointer")
                            .style("filter", "drop-shadow(0px 3px 3px rgba(0,0,0,0.1))")
                            .on("click", (event, d) => { event.stopPropagation(); openModal(d); });
                            
                        g.append("foreignObject")
                            .style("pointer-events", "none") 
                            .append("xhtml:div")
                            .attr("class", "bubble-text");
                        return g;
                    }
                );

            node.select("circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.id === "root" ? "#ffffff" : d.color);

            node.select("foreignObject")
                .attr("width", d => d.id === "root" ? d.radius * 3.5 : d.radius * 1.45) 
                .attr("height", d => d.id === "root" ? d.radius * 3.5 : d.radius * 1.45)
                .attr("x", d => d.id === "root" ? -d.radius * 1.75 : -d.radius * 0.725)
                .attr("y", d => d.id === "root" ? -d.radius * 1.75 : -d.radius * 0.725);

            node.select(".bubble-text")
                .style("color", "#000")
                .style("font-weight", "bold")
                .style("font-size", d => {
                    const len = d.label.length;
                    let divider = len < 8 ? 2.5 : len < 15 ? 3.2 : len < 25 ? 4.0 : 5.0;               
                    return Math.max(10, d.radius / divider) + "px";
                })
                .html(d => {
                    if (d.id === "root") {
                        const cleanH = handle.replace("@", "");
                        return `
                            <div style="line-height: 1.4; font-size: 0.9em; text-align: center;">
                                What do you think of<br>
                                <a href="https://www.instagram.com/${cleanH}/" target="_blank" 
                                   style="color: #0000EE; text-decoration: underline; pointer-events: auto; word-break: break-all;"
                                   onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()">
                                    ${handle}
                                </a>?
                            </div>
                        `;
                    }
                    return d.label;
                });

            simulation.on("tick", () => {
                const time = Date.now() / 1000; 
                node.attr("transform", d => {
                    if(!d.x) d.x = width/2; if(!d.y) d.y = height/2;
                    d.displayY = d.y + (Math.sin(time * 2 + (d.phase||0)) * 3); 
                    return `translate(${d.x}, ${d.displayY})`;
                });
                link
                    .attr("x1", d => d.source.x).attr("y1", d => d.source.displayY || d.source.y) 
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.displayY || d.target.y);
            });
        }

        window.openModal = function(node) {
            selectedNode = node;
            document.getElementById("inputModal").style.display = "flex";
            document.getElementById("commentInput").focus();
        }

        window.closeModal = function() {
            document.getElementById("inputModal").style.display = "none";
            document.getElementById("commentInput").value = "";
            selectedNode = null;
        }

        window.submitComment = async function() {
            const text = document.getElementById("commentInput").value;
            if (!text) return alert("Please enter a comment.");

            const newId = "node-" + Date.now();
            const newNode = { id: newId, label: text, color: "#ffffff", radius: 50, x: selectedNode.x + (Math.random() - 0.5) * 50, y: selectedNode.y + (Math.random() - 0.5) * 50, phase: Math.random() * Math.PI * 2 };
            const newLink = { source: selectedNode.id, target: newId };

            window.dataset.nodes.push(newNode);
            window.dataset.links.push(newLink);
            
            const parentNode = window.dataset.nodes.find(n => n.id === selectedNode.id);
            if (parentNode && parentNode.radius < 200) parentNode.radius += 8;

            window.closeModal();

            const saveNodes = window.dataset.nodes.map(n => ({ id: n.id, label: n.label, color: n.color, radius: n.radius, x: n.x, y: n.y, phase: n.phase }));
            const saveLinks = window.dataset.links.map(l => ({ source: l.source.id || l.source, target: l.target.id || l.target }));

            await updateDoc(docRef, { nodes: saveNodes, links: saveLinks });
        }

        function drag(simulation) {
            function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
            function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
            function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
            return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
        }

        document.getElementById("commentInput").addEventListener("keyup", e => { if (e.key === "Enter") window.submitComment(); });
    </script>
</body>
</html>
